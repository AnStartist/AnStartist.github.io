<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>adofan PIXI</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; position:fixed;top: 0;left: 0;z-index: -9999;}
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        .content-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem 2rem;
            position: relative;
            z-index: 1;
        }

        .corner-notice {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
            background: rgba(30, 30, 30, 0.85);
            border-radius: 15px;
            padding: 8px 16px;
            max-width: 400px;
            min-width: 150px;
            width: auto;
            font-family: inherit;
            color: #f1f5f9;
            word-break: break-word;
            white-space: normal;
            line-height: 1.2;
            letter-spacing: 0.01em;
        }

        .notice-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-align: right;
        }
        .notice-text {
            font-size: 0.88rem;
            opacity: 0.92;
            font-weight: 450;
            line-height: 1.45;
        }

        @media (max-width: 560px) {
            .corner-notice {
                top: 16px;
                right: 16px;
                max-width: calc(100% - 32px);
                padding: 8px 16px;
                border-radius: 15px;
            }
            .notice-text {
                font-size: 0.8rem;
            }
            .content-wrapper {
                padding: 1.2rem 1.2rem 3rem 1.2rem;
            }
        }
    </style>
  
  
  
  
  
  
  
  
  
  
  
</head>
